name: Build Windows Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

jobs:
  build-win64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Win64 desktop package
        run: npm run dist:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ham-checkin-win64
          path: |
            release/*.exe
            release/*.blockmap
