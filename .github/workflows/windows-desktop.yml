name: Build Windows Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

jobs:
  build-win64:
    name: Build Win64 package
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Win64 package
        run: npm run webview:build -- --bundles nsis

      - name: Stage Win64 artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path release\windows-win64 | Out-Null
          $version = node -p "require('./package.json').version"
          $displayVersion = "1.01.1"
          $nsis = Get-ChildItem -Path src-tauri\target\release\bundle\nsis -Filter *.exe -File | Select-Object -First 1
          if (-not $nsis) {
            throw "Win64 NSIS installer was not generated."
          }
          Copy-Item $nsis.FullName "release\windows-win64\HAM-Checkin-$displayVersion-Win64-Setup.exe"
          $blockmap = Get-ChildItem -Path src-tauri\target\release\bundle\nsis -Filter *.nsis.zip -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($blockmap) {
            Copy-Item $blockmap.FullName "release\windows-win64\HAM-Checkin-$displayVersion-Win64-Setup.nsis.zip"
          }
          Get-FileHash release\windows-win64\* -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content "release\windows-win64\SHA256SUMS-Win64-$displayVersion.txt"
          Get-ChildItem release\windows-win64

      - name: Upload Win64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ham-checkin-win64
          path: release/windows-win64/*
